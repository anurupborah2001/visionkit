name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 02:00 UTC to catch newly published CVEs
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Security tab

jobs:
  # ── 1. Python dependency audit (pip-audit + OSV database) ─────────────────
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: uv sync --all-groups

      - name: Run pip-audit (SBOM)
        run: |
          uv run pip-audit \
            --local \
            --format cyclonedx-json \
            --output pip-audit-sbom.json \
            --progress-spinner off || true

      - name: Run pip-audit (fail on critical)
        run: |
          uv run pip-audit \
            --local \
            --progress-spinner off

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-sbom
          path: pip-audit-sbom.json
          retention-days: 30

  # ── 2. Trivy filesystem + dependency scan with SARIF upload ───────────────
  trivy:
    name: Trivy (filesystem + SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"       # don't block CI — upload findings first
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # ── 3. CodeQL static analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL (static analysis)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-python
